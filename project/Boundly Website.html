<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boundly — GTM Recruitment for UK SaaS</title>

<style>
@font-face { font-family: 'Recoleta'; src: url('fonts/Recoleta-Bold.ttf') format('truetype'); font-weight: 700; }
@font-face { font-family: 'Recoleta'; src: url('fonts/Recoleta-SemiBold.ttf') format('truetype'); font-weight: 600; }
@font-face { font-family: 'Recoleta'; src: url('fonts/Recoleta-Black.ttf') format('truetype'); font-weight: 900; }
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Animations.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Stats.jsx"></script>
<script type="text/babel" src="Process.jsx"></script>
<script type="text/babel" src="Testimonials.jsx"></script>
<script type="text/babel" src="CTA.jsx"></script>

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  background: #111111;
  color: #242424;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
#root { min-height: 100vh; }

::placeholder { color: rgba(255,255,255,0.18); }

/* Mobile styles */
@media (max-width: 700px) {
  .desktop-nav { display: none !important; }
  .desktop-cta { display: none !important; }
  .mobile-menu-btn { display: flex !important; }
}

@media (max-width: 860px) {
  /* Two-col → single col */
  #how-we-work .process-grid,
  #about .about-grid,
  #contact .contact-grid {
    grid-template-columns: 1fr !important;
    gap: 40px !important;
  }

  /* Testimonials */
  #testimonials .test-grid {
    grid-template-columns: 1fr !important;
  }

  /* Roles */
  #roles .roles-grid {
    grid-template-columns: repeat(2, 1fr) !important;
  }

  /* Stats */
  .stats-grid {
    grid-template-columns: 1fr !important;
  }
  .stats-divider { display: none !important; }

  /* Section padding */
  section { padding-left: 20px !important; padding-right: 20px !important; }
  footer { padding-left: 20px !important; padding-right: 20px !important; }

  /* Process 2-col → 1-col */
  .process-grid { grid-template-columns: 1fr !important; }

  /* Footer stack */
  .footer-inner { flex-direction: column !important; align-items: flex-start !important; gap: 16px !important; }
}

@media (max-width: 500px) {
  /* Roles → 1 col on very small */
  #roles .roles-grid { grid-template-columns: 1fr !important; }
}
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#111111">
  <svg viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
    <rect width="500" height="300" fill="#111111"/>
    <text x="60" y="140" font-family="serif" font-weight="900" font-size="64" fill="white">Bound</text>
    <text x="310" y="140" font-family="serif" font-weight="900" font-size="64" fill="#C47D3F">ly.</text>
    <text x="60" y="175" font-family="sans-serif" font-size="16" fill="rgba(255,255,255,0.35)">GTM Recruitment · UK B2B SaaS</text>
  </svg>
</template>

<div id="root"></div>

<script>
// Global scroll function — available before React mounts
window.boundlyNav = function(id) {
  if (id === 'hero') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
  // Small delay to ensure DOM is ready
  requestAnimationFrame(() => {
    const el = document.getElementById(id);
    if (el) {
      const y = el.getBoundingClientRect().top + window.scrollY - 72;
      window.scrollTo({ top: y, behavior: 'smooth' });
    }
  });
};
</script>

<script type="text/babel">
const App = () => (
  <div>
    <BoundlyHeader onNavigate={window.boundlyNav} />
    <BoundlyHero onNavigate={window.boundlyNav} />
    <BoundlyStats />
    <BoundlyQuote />
    <BoundlyProcess />
    <BoundlyTestimonials />
    <BoundlyAbout />
    <BoundlyRoles />
    <BoundlyCTA />
    <BoundlyFooter />
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
