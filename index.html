<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boundly — GTM Recruitment for UK SaaS</title>
  <meta name="description" content="Boutique GTM recruitment for UK SaaS companies from pre-seed through Series B. Built by someone who's been on both sides.">
  <meta property="og:title" content="Boundly — GTM Recruitment for UK SaaS">
  <meta property="og:description" content="Boutique GTM recruitment for UK SaaS companies from pre-seed through Series B.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <style>
    @font-face { font-family: 'Recoleta'; src: url('css/Recoleta-Bold.ttf') format('truetype'); font-weight: 700; }
    @font-face { font-family: 'Recoleta'; src: url('css/Recoleta-SemiBold.ttf') format('truetype'); font-weight: 600; }
    @font-face { font-family: 'Recoleta'; src: url('css/Recoleta-Black.ttf') format('truetype'); font-weight: 900; }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="project/Animations.jsx"></script>
  <script type="text/babel" src="project/Header.jsx"></script>
  <script type="text/babel" src="project/Hero.jsx"></script>
  <script type="text/babel" src="project/Stats.jsx"></script>
  <script type="text/babel" src="project/Process.jsx"></script>
  <script type="text/babel" src="project/Testimonials.jsx"></script>
  <script type="text/babel" src="project/CTA.jsx"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: #111111;
      color: #242424;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root { min-height: 100vh; }

    ::placeholder { color: rgba(255,255,255,0.18); }

    @media (max-width: 700px) {
      .desktop-nav { display: none !important; }
      .desktop-cta { display: none !important; }
      .mobile-menu-btn { display: flex !important; }
    }

    @media (max-width: 860px) {
      #how-we-work .process-grid,
      #about .about-grid,
      #contact .contact-grid {
        grid-template-columns: 1fr !important;
        gap: 0 !important;
      }
      #testimonials .test-grid { grid-template-columns: 1fr !important; }
      #roles .roles-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .stats-grid { grid-template-columns: 1fr !important; }
      .stats-divider { display: none !important; }
      section { padding-left: 20px !important; padding-right: 20px !important; }
      footer { padding-left: 20px !important; padding-right: 20px !important; }
      .process-grid { grid-template-columns: 1fr !important; }
      .footer-inner { flex-direction: column !important; align-items: flex-start !important; gap: 16px !important; }
    }

    @media (max-width: 600px) {
      html, body { overflow-x: hidden; }
      .process-card { padding: 32px 24px !important; }
      .stats-grid { padding: 0 !important; }
    }

    @media (max-width: 500px) {
      #roles .roles-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>

<div id="root"></div>

<script>
window.boundlyNav = function(id) {
  if (id === 'hero') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
  requestAnimationFrame(() => {
    const el = document.getElementById(id);
    if (el) {
      const y = el.getBoundingClientRect().top + window.scrollY - 72;
      window.scrollTo({ top: y, behavior: 'smooth' });
    }
  });
};
</script>

<script type="text/babel">
const App = () => (
  <div>
    <BoundlyHeader onNavigate={window.boundlyNav} />
    <BoundlyHero onNavigate={window.boundlyNav} />
    <BoundlyStats />
    <BoundlyQuote />
    <BoundlyProcess />
    <BoundlyTestimonials />
    <BoundlyAbout />
    <BoundlyRoles />
    <BoundlyCTA />
    <BoundlyFooter />
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
